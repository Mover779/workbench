<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LuckyBoard</title>
    <meta name="description" content="오늘의 운세를 한눈에 확인하는 종합 운세 서비스">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Pretendard -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div class="background"></div>

    <main class="container">

        <!-- Header -->
        <header class="hero">

            <div class="logo">
                🍀
            </div>

            <h1>LuckyBoard</h1>

            <p class="subtitle">
                오늘의 행운을 한눈에
            </p>

            <div class="today">
                <span id="todayDate"></span>
            </div>

        </header>

        <!-- 종합 운세 -->

        <section class="summary card">

            <div class="title-row">
                <h2>✨ 오늘의 종합 운세</h2>
                <span id="overallScore">92점</span>
            </div>

            <p id="overallComment">
                오늘은 새로운 기회를 발견하기 좋은 하루입니다.
            </p>

        </section>

        <!-- 운세 카드 -->

        <section class="fortune-grid">

            <article class="card">
                <h3>🌅 오하아사</h3>
                <strong id="ohayou">95점</strong>
            </article>

            <article class="card">
                <h3>⭐ 별자리</h3>
                <strong id="zodiac">★★★★☆</strong>
            </article>

            <article class="card">
                <h3>🐲 띠운세</h3>
                <strong id="animal">좋음</strong>
            </article>

            <article class="card">
                <h3>🎴 오늘의 타로</h3>
                <strong id="tarot">The Star</strong>
            </article>

            <article class="card">
                <h3>🎲 오늘의 뽑기</h3>
                <strong id="luck">대길</strong>
            </article>

            <article class="card">
                <h3>🍀 행운 아이템</h3>
                <strong id="item">화이트 셔츠</strong>
            </article>

            <article class="card">
                <h3>🎨 행운 컬러</h3>
                <strong id="color">Sky Blue</strong>
            </article>

            <article class="card">
                <h3>🔢 행운 숫자</h3>
                <strong id="number">7</strong>
            </article>

        </section>

        <!-- 오늘의 한마디 -->

        <section class="quote card">

            <h2>💬 오늘의 한마디</h2>

            <blockquote id="quote">
                작은 행운은 준비된 사람에게 먼저 찾아옵니다.
            </blockquote>

        </section>

        <!-- 버튼 -->

        <section class="actions">

            <button id="refreshBtn">
                🔄 오늘의 운세 다시 뽑기
            </button>

        </section>

    </main>

    <footer>

        <p>
            © 2026 LuckyBoard · Today's Fortune Dashboard
        </p>

    </footer>

    <script src="./js/script.js"></script>

</body>

</html>
